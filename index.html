<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကောင်းမြတ် - POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .qty-btn { width: 45px; height: 45px; font-size: 22px; font-weight: bold; }
        .product-card { border-left: 5px solid #0d6efd; }
        .search-results { position: absolute; width: 100%; z-index: 1000; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ced4da; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
        .search-item:hover { background-color: #f8f9fa; }
        
        /* 🖨️ Voucher Print Layout */
        #print-receipt-zone { display: none; }
        @media print {
            @page { size: auto; margin: 0mm; }
            body > *:not(#print-receipt-zone) { display: none !important; }
            html, body { background-color: #fff; margin: 0 !important; padding: 0 !important; width: 100% !important; }
            #print-receipt-zone { 
                display: block !important;
                position: absolute; left: 0; top: 0; width: 100% !important; max-width: 100% !important;
                padding: 20px !important; margin: 0 auto !important; font-family: sans-serif; color: #000; box-sizing: border-box;
            }
        }
    </style>

    <script>
        // ⚠️ သင့်ရဲ့ Deploy လုပ်ပြီးရလာတဲ့ Web App URL ကို ဒီနေရာမှာ အစားထိုးပါဗျာ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzOZlu3r1_QDucTrLFYV8yZq1ll6URpldMt33hhMLfIbQcs_dF0CdhhnBg8zhjBoUYr/exec'; 
        
        // 🔐 Admin ဝင်ရန် သတ်မှတ်ထားသော Password (မိမိစိတ်ကြိုက် ပြောင်းလဲနိုင်ပါသည်)
        const adminPassword = '5858'; 

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
</head>
<body class="bg-light">

    <div id="print-receipt-zone"></div>

    <div id="app-main-content">
        <nav class="navbar navbar-dark bg-dark sticky-top shadow">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1 fw-bold">ကောင်းမြတ် (Kaung Myat POS)</span>
            </div>
        </nav>

        <div class="btn-group w-100 sticky-top bg-white shadow-sm mb-3" role="group">
            <button id="btn-sales" class="btn btn-outline-primary py-2 active" onclick="switchTab('sales')">🛒 အရောင်း</button>
            <button id="btn-history" class="btn btn-outline-primary py-2" onclick="switchTab('history')">📜  မှတ်တမ်း</button>
            <button id="btn-admin" class="btn btn-outline-primary py-2" onclick="switchTab('admin')">⚙️ Admin</button>
        </div>

        <div class="container pb-5">
            
            <div id="sales" class="tab-content active">
                <div class="card p-2 mb-3 shadow-sm border-0">
                    <h6 class="card-title fw-bold text-secondary">📷 Barcode Scanner</h6>
                    <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden;"></div>
                </div>

                <div class="card p-3 mb-3 shadow-sm border-0 position-relative">
                    <h6 class="card-title fw-bold text-secondary">🔍 ပစ္စည်းအမည်ဖြင့် ရှာရန်</h6>
                    <input type="text" id="name-search-input" class="form-control form-control-lg" placeholder="ပစ္စည်းအမည် ရိုက်ထည့်ပါ..." onkeyup="filterProductNames()">
                    <div id="search-suggestions" class="search-results" style="display: none;"></div>
                </div>

                <div class="card p-3 shadow-sm border-0">
                    <h5 class="card-title fw-bold mb-3">ဝယ်ယူနေသော ပစ္စည်းများ</h5>
                    <div id="cart-list" class="list-group mb-3">
                        <div class="text-center text-muted py-4">ပစ္စည်းများ စကန်ဖတ်ပါ သို့မဟုတ် ရွေးချယ်ပါ</div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">စုစုပေါင်း ကျသင့်ငွေ</small>
                            <h3 class="fw-bold text-primary"><span id="cart-total">0</span> Ks</h3>
                        </div>
                        <button id="checkout-btn" class="btn btn-success btn-lg px-4 shadow" onclick="checkout()">Voucher ထုတ်မည်</button>
                    </div>
                </div>
            </div>

            <div id="history" class="tab-content">
                <div class="card p-3 shadow-sm border-0 mb-3">
                    <input type="text" id="search-input" class="form-control form-control-lg" placeholder="🔍 Voucher ID သို့မဟုတ် ဝယ်သူအမည်ဖြင့် ရှာရန်..." onkeyup="searchHistory()">
                </div>
                <div id="history-list">
                    <div class="text-center text-muted py-4">မှတ်တမ်းများကို ဆွဲယူနေပါသည်...</div>
                </div>
            </div>

            <div id="admin" class="tab-content">
                <div class="card p-3 shadow-sm border-0 mb-4 bg-white" style="border-top: 5px solid #28a745 !important;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title fw-bold text-success mb-0">➕ ပစ္စည်းအသစ် ထည့်သွင်းရန်</h5>
                        <button class="btn btn-sm btn-outline-danger" onclick="logoutAdmin()">🔒 Admin ပိတ်မည်</button>
                    </div>
                    <form id="hidden-form" method="POST" target="hidden-iframe" class="row g-2">
                        <input type="hidden" name="jsonData" id="form-json-data">
                        <div class="col-12">
                            <input type="text" id="new-barcode" class="form-control" placeholder="Barcode နံပါတ် (မရှိပါက လွတ်ထားနိုင်ပါသည်)">
                        </div>
                        <div class="col-12">
                            <input type="text" id="new-name" class="form-control" placeholder="ပစ္စည်းအမည်" required>
                        </div>
                        <div class="col-6">
                            <input type="number" id="new-price" class="form-control" placeholder="ဈေးနှုန်း (Ks)">
                        </div>
                        <div class="col-6">
                            <input type="number" id="new-stock" class="form-control" placeholder="လက်ကျန်ခုရေ">
                        </div>
                        <div class="col-12 mt-3">
                            <button type="button" class="btn btn-success w-100 fw-bold py-2 shadow-sm" id="add-prod-btn" onclick="addNewProduct()">💾 Google Sheet ထဲသို့ ပစ္စည်းအသစ်သိမ်းမည်</button>
                        </div>
                    </form>
                    <iframe name="hidden-iframe" id="hidden-iframe" style="display:none;"></iframe>
                </div>

                <div class="card p-3 shadow-sm border-0">
                    <h5 class="card-title fw-bold mb-3 text-secondary">📝 ရှိပြီးသား ပစ္စည်းစာရင်း/ဈေးနှုန်း ပြင်ရန် သို့မဟုတ် ဖျက်ရန်</h5>
                    <button class="btn btn-primary mb-3 w-100 fw-bold" onclick="loadProductsFromSheet()">🔄 Google Sheet မှ ပစ္စည်းစာရင်း ပြန်ဆွဲယူရန်</button>
                    
                    <div class="position-relative mb-3">
                        <input type="text" id="admin-search-input" class="form-control form-control-lg border-primary" placeholder="🔍 ပြင်လို/ဖျက်လိုသော ပစ္စည်းအမည်ကို ရိုက်ရှာပါ..." onkeyup="filterAdminProductNames()">
                        <div id="admin-search-suggestions" class="search-results" style="display: none;"></div>
                    </div>

                    <div id="admin-product-list" class="list-group"></div>
                </div>
            </div>

        </div>
    </div>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        const beep = document.getElementById('beep-sound');
        let canScan = true;
        let cart = [];
        let productsDB = []; 
        let salesHistory = [];

        try {
            const localData = localStorage.getItem('salesHistory');
            if(localData) { salesHistory = JSON.parse(localData); }
        } catch(e) { console.log(e); }

        window.onload = function() {
            document.getElementById('hidden-form').action = scriptURL;
            loadProductsFromSheet();
            loadSalesHistoryFromSheet(); 
            displayHistory(salesHistory);
        }

        function playBeep() { beep.currentTime = 0; beep.play().catch(e => {}); }

        function switchTab(tabId) {
            // 🔒 Admin Tab ကိုနှိပ်လျှင် Password စစ်ဆေးမည့်စနစ်
            if (tabId === 'admin') {
                const isAuthed = localStorage.getItem('isAdminAuthenticated');
                if (isAuthed !== 'true') {
                    let passInput = prompt("🔒 Admin ဧရိယာသို့ဝင်ရန် Password ရိုက်ထည့်ပေးပါဗျာ -", "");
                    if (passInput === null) return; // Cancel နှိပ်ရင် ဘာမှမလုပ်ပါ
                    
                    if (passInput === adminPassword) {
                        localStorage.setItem('isAdminAuthenticated', 'true'); // ဖုန်းထဲတွင် မှတ်သားထားလိုက်မည်
                        alert("🔓 Password မှန်ကန်ပါသည်။ အောင်မြင်စွာ ဝင်ရောက်ပြီးပါပြီ။");
                    } else {
                        alert("❌ Password မှားယွင်းနေပါသည်။ ပြန်လည်ကြိုးစားပေးပါဗျာ။");
                        return;
                    }
                }
            }

            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.btn-group .btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'admin') {
                document.getElementById('admin-search-input').value = '';
                renderAdminProducts(productsDB); 
            } else if(tabId === 'history') {
                displayHistory(salesHistory);
                loadSalesHistoryFromSheet(); 
            }
        }

        // 🔒 ဖုန်းထဲမှာ မှတ်ထားတဲ့ Admin login ဒေတာကို ပြန်ဖျက်ထုတ်ရန် (အခြားသူကို မကိုင်စေချင်သည့်အခါ သုံးနိုင်သည်)
        function logoutAdmin() {
            if(confirm("Admin စနစ်ကို ပြန်ပိတ်ပြီး Password ပြန်ခံထားမလားဗျာ။")) {
                localStorage.removeItem('isAdminAuthenticated');
                alert("🔒 Admin စနစ်ကို ပြန်လည်ပိတ်ဆို့ပြီးပါပြီ။");
                switchTab('sales');
            }
        }

        function loadProductsFromSheet() {
            if(!scriptURL || scriptURL.includes('ဒီနေရာမှာ')) return;
            fetch(scriptURL + '?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => { productsDB = data; renderAdminProducts(productsDB); })
            .catch(err => console.log(err));
        }

        function loadSalesHistoryFromSheet() {
            if(!scriptURL || scriptURL.includes('ဒီနေရာမှာ')) return;
            fetch(scriptURL + '?getSales=true&t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                if(data && data.length > 0) {
                    salesHistory = data;
                    localStorage.setItem('salesHistory', JSON.stringify(salesHistory)); 
                    displayHistory(salesHistory);
                }
            }).catch(err => {
                console.log("History Sync Error:", err);
                displayHistory(salesHistory);
            });
        }

        function filterProductNames() {
            let input = document.getElementById('name-search-input').value.toLowerCase().trim();
            let suggestionsBox = document.getElementById('search-suggestions');
            if (input === '') { suggestionsBox.style.display = 'none'; return; }
            let filtered = productsDB.filter(p => p.name.toLowerCase().includes(input));
            if (filtered.length === 0) { suggestionsBox.innerHTML = '<div class="search-item text-muted">ရှာမတွေ့ပါ...</div>'; suggestionsBox.style.display = 'block'; return; }
            suggestionsBox.innerHTML = '';
            filtered.forEach(prod => {
                let div = document.createElement('div');
                div.className = 'search-item d-flex justify-content-between align-items-center';
                div.innerHTML = `<div><strong>${prod.name}</strong></div> <div class="text-primary fw-bold">${prod.price} Ks</div>`;
                div.onclick = function() {
                    playBeep(); addByProductObject(prod);
                    document.getElementById('name-search-input').value = '';
                    suggestionsBox.style.display = 'none';
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        }

        function filterAdminProductNames() {
            let input = document.getElementById('admin-search-input').value.toLowerCase().trim();
            let suggestionsBox = document.getElementById('admin-search-suggestions');
            if (input === '') { suggestionsBox.style.display = 'none'; renderAdminProducts(productsDB); return; }
            let filtered = productsDB.filter(p => p.name.toLowerCase().includes(input));
            if (filtered.length === 0) { suggestionsBox.innerHTML = '<div class="search-item text-muted">ရှာမတွေ့ပါ...</div>'; suggestionsBox.style.display = 'block'; return; }
            suggestionsBox.innerHTML = '';
            filtered.slice(0, 15).forEach(prod => { 
                let div = document.createElement('div');
                div.className = 'search-item d-flex justify-content-between align-items-center';
                div.innerHTML = `<div><strong>${prod.name}</strong></div><div class="text-muted" style="font-size:12px;">Price: ${prod.price} Ks</div>`;
                div.onclick = function() {
                    document.getElementById('admin-search-input').value = prod.name;
                    suggestionsBox.style.display = 'none'; renderAdminProducts([prod]); 
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (e.target.id !== 'name-search-input') document.getElementById('search-suggestions').style.display = 'none';
            if (e.target.id !== 'admin-search-input') document.getElementById('admin-search-suggestions').style.display = 'none';
        });

        function onScanSuccess(decodedText, decodedResult) {
            if (canScan) {
                playBeep();
                if(document.getElementById('admin').classList.contains('active')) {
                    document.getElementById('new-barcode').value = decodedText;
                    alert("Barcode ဖတ်မိပါပြီ။ အချက်အလက်ဖြည့်ပြီး သိမ်းဆည်းပါ။");
                } else { addToCart(decodedText); }
                canScan = false; setTimeout(() => { canScan = true; }, 3000); 
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        function addNewProduct() {
            let barcode = document.getElementById('new-barcode').value.trim();
            let name = document.getElementById('new-name').value.trim();
            let price = document.getElementById('new-price').value.trim();
            let stock = document.getElementById('new-stock').value.trim() || 0;
            if(!barcode) { barcode = "NB-" + Date.now().toString().slice(-6); }
            if(!name || !price) { return alert("ကျေးဇူးပြု၍ အချက်အလက်ဖြည့်ပေးပါဗျာ။"); }
            let btn = document.getElementById('add-prod-btn');
            btn.disabled = true; btn.innerText = "⏳ သိမ်းဆည်းနေပါသည်...";
            let payload = { action: "updateProduct", barcode: barcode, name: name, price: Number(price), stock: Number(stock) };
            document.getElementById('form-json-data').value = JSON.stringify(payload);
            document.getElementById('hidden-form').submit();
            setTimeout(() => {
                alert("ပစ္စည်းအသစ် သိမ်းဆည်းခြင်း လုပ်ဆောင်ချက် ပြီးမြောက်ပါပြီ။");
                btn.disabled = false; btn.innerText = "💾 Google Sheet ထဲသို့ ပစ္စည်းအသစ်သိမ်းမည်";
                document.getElementById('new-barcode').value = '';
                document.getElementById('new-name').value = '';
                document.getElementById('new-price').value = '';
                document.getElementById('new-stock').value = '';
                loadProductsFromSheet();
            }, 2000);
        }

        function addToCart(barcode) {
            let product = productsDB.find(p => p.barcode.toString() === barcode.toString());
            if (!product) { product = { barcode: barcode, name: "ပစ္စည်းအသစ် (" + barcode + ")", price: 0, stock: 0 }; productsDB.push(product); }
            addByProductObject(product);
        }

        function addByProductObject(product) {
            let item = cart.find(i => i.barcode === product.barcode);
            if (item) { item.qty++; } else { cart.push({ ...product, qty: 1 }); }
            renderCart();
        }

        function changeQty(index, change) {
            playBeep(); cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list'); let total = 0;
            if(cart.length === 0) { list.innerHTML = '<div class="text-center text-muted py-4">ပစ္စည်းများ စကန်ဖတ်ပါ သို့မဟုတ် ရွေးချယ်ပါ</div>'; document.getElementById('cart-total').innerText = 0; return; }
            list.innerHTML = '';
            cart.forEach((item, index) => {
                let itemTotal = item.price * item.qty; total += itemTotal;
                list.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2 rounded border-0 product-card">
                        <div><h6 class="fw-bold mb-1">${item.name}</h6><small class="text-primary fw-bold">${item.price} Ks</small></div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-danger qty-btn shadow-sm" onclick="changeQty(${index}, -1)">-</button>
                            <span class="mx-3 fw-bold fs-5">${item.qty}</span>
                            <button class="btn btn-success qty-btn shadow-sm" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function checkout() {
            if(cart.length === 0) return alert("ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိပါ။");
            playBeep();
            let customerName = prompt("ဝယ်ယူသူအမည် (Customer Name) ကို ရိုက်ထည့်ပေးပါဗျာ -\n(မထည့်ဘဲ OK နှိပ်ပါက 'အထွေထွေ' ဟု သတ်မှတ်ပါမည်)", "");
            if (customerName === null) { return; }
            customerName = customerName.trim() || "အထွေထွေ";
            
            let voucherId = "KM-" + Date.now().toString().slice(-6);
            let total = document.getElementById('cart-total').innerText;
            
            let saleData = { action: "addSale", voucherId: voucherId, customerName: customerName, items: cart, total: total };
            let localData = { ...saleData, date: new Date().toLocaleString() };

            try {
                salesHistory.unshift(localData);
                localStorage.setItem('salesHistory', JSON.stringify(salesHistory));
                displayHistory(salesHistory);
            } catch(e) { console.log(e); }

            printVoucher(localData);

            try {
                document.getElementById('form-json-data').value = JSON.stringify(saleData);
                document.getElementById('hidden-form').submit();
            } catch(e) { console.log(e); }
            
            cart = []; 
            renderCart(); 
            alert("Voucher ထုတ်ယူခြင်း အောင်မြင်ပါပြီ။");
        }

        function printVoucher(sale) {
            const printZone = document.getElementById('print-receipt-zone');
            let itemsHTML = '';
            
            sale.items.forEach(i => { 
                itemsHTML += `
                    <tr style="font-size: 14px;">
                        <td style="text-align: left; padding: 6px 0; word-break: break-all; max-width: 40%;">${i.name}</td>
                        <td style="text-align: right; padding: 6px 0;">${Number(i.price).toLocaleString()}</td>
                        <td style="text-align: center; padding: 6px 0;">${i.qty}</td>
                        <td style="text-align: right; padding: 6px 0;">${(i.price * i.qty).toLocaleString()}</td>
                    </tr>`; 
            });

            printZone.innerHTML = `
                <div style="width: 100%; padding: 5px; font-family: sans-serif; color: #000; box-sizing: border-box;">
                    <div style="text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 8px;">ကောင်းမြတ် POS</div>
                    <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>
                    
                    <table style="width: 100%; font-size: 14px; border-collapse: collapse; line-height: 1.6;">
                        <tr>
                            <td style="text-align: left; width: 30%;">Voucher:</td>
                            <td style="text-align: right; font-weight: bold;">${sale.voucherId}</td>
                        </tr>
                        <tr>
                            <td style="text-align: left;">ဝယ်သူ:</td>
                            <td style="text-align: right;">${sale.customerName}</td>
                        </tr>
                        <tr>
                            <td style="text-align: left;">နေ့ရက်:</td>
                            <td style="text-align: right;">${sale.date || new Date().toLocaleString()}</td>
                        </tr>
                    </table>
                    
                    <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>
                    
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="font-size: 14px; font-weight: bold; border-bottom: 1px dashed #000;">
                                <th style="text-align: left; padding-bottom: 6px; width: 38%;">ပစ္စည်းအမည်</th>
                                <th style="text-align: right; padding-bottom: 6px; width: 24%;">ဈေးနှုန်း</th>
                                <th style="text-align: center; padding-bottom: 6px; width: 13%;">ခု</th>
                                <th style="text-align: right; padding-bottom: 6px; width: 25%;">သင့်ငွေ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHTML}
                        </tbody>
                    </table>
                    
                    <div style="border-top: 1px dashed #000; margin: 6px 0;"></div>
                    
                    <table style="width: 100%; font-size: 18px; font-weight: bold;">
                        <tr>
                            <td style="text-align: left;">စုစုပေါင်း:</td>
                            <td style="text-align: right;">${sale.total} Ks</td>
                        </tr>
                    </table>
                    
                    <div style="border-top: 1px dashed #000; margin: 8px 0;"></div>
                    <div style="text-align: center; font-size: 14px; margin-top: 12px; font-weight: 500;">ဝယ်ယူအားပေးမှုကို ကျေးဇူးတင်ပါသည်!</div>
                </div>`;
                
            setTimeout(() => { window.print(); }, 600);
        }

        function displayHistory(data) {
            const list = document.getElementById('history-list'); 
            if(!data || data.length === 0) { list.innerHTML = '<div class="text-center text-muted py-4">အရောင်းမှတ်တမ်း မရှိသေးပါဗျာ။</div>'; return; }
            list.innerHTML = '';
            data.forEach((sale, index) => {
                let itemsList = "";
                try {
                    itemsList = sale.items.map(i => `<small class="d-block">${i.name} x ${i.qty}</small>`).join('');
                } catch(e) { itemsList = "<small class='text-danger'>ပစ္စည်းစာရင်းဖတ်မရပါ</small>"; }
                
                list.innerHTML += `
                    <div class="card p-3 mb-3 shadow-sm border-0">
                        <div class="d-flex justify-content-between mb-2">
                            <h6 class="fw-bold text-primary">ID: ${sale.voucherId}</h6>
                            <small class="text-muted">${sale.date}</small>
                        </div>
                        <div class="text-secondary mb-2" style="font-size:14px;">ဝယ်သူ: <b>${sale.customerName || "အထွေထွေ"}</b></div>
                        <div class="mb-2 bg-light p-2 rounded">${itemsList}</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold text-success mb-0">${sale.total} Ks</h5>
                            <button class="btn btn-sm btn-outline-dark" onclick='printVoucher(${JSON.stringify(sale)})'>🖨️ ပြန်ထုတ်ရန်</button>
                        </div>
                    </div>`;
            });
        }

        function searchHistory() {
            let text = document.getElementById('search-input').value.toLowerCase().trim();
            let filtered = salesHistory.filter(s => s.voucherId.toLowerCase().includes(text) || (s.customerName && s.customerName.toLowerCase().includes(text)));
            displayHistory(filtered);
        }

        function renderAdminProducts(arrayToRender) {
            const list = document.getElementById('admin-product-list'); list.innerHTML = '';
            if(!arrayToRender || arrayToRender.length === 0) { list.innerHTML = '<div class="text-center text-muted py-3">ပစ္စည်းစာရင်း မရှိသေးပါ။</div>'; return; }
            arrayToRender.forEach((prod) => {
                let mainIndex = productsDB.findIndex(p => p.barcode.toString() === prod.barcode.toString());
                list.innerHTML += `
                    <div class="list-group-item p-3 mb-3 rounded border shadow-sm bg-white">
                        <h6 class="fw-bold text-dark mb-1">${prod.name}</h6>
                        <small class="text-muted d-block mb-3">Barcode: ${prod.barcode}</small>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label text-secondary mb-1" style="font-size:12px;">ဈေးနှုန်း (Ks)</label>
                                <input type="number" id="p-price-${mainIndex}" class="form-control fw-bold text-primary" value="${prod.price}">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary mb-1" style="font-size:12px;">လက်ကျန် Stock</label>
                                <input type="number" id="p-stock-${mainIndex}" class="form-control fw-bold text-success" value="${prod.stock || 0}">
                            </div>
                        </div>
                        <div class="row g-2">
                            <div class="col-8">
                                <button class="btn btn-warning w-100 fw-bold shadow-sm" onclick="uploadProductToSheet(${mainIndex})">💾 ပြင်ဆင်ချက်သိမ်းမည်</button>
                            </div>
                            <div class="col-4">
                                <button class="btn btn-danger w-100 fw-bold shadow-sm" onclick="deleteProductFromSheet(${mainIndex})">🗑️ ဖျက်မည်</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function uploadProductToSheet(index) {
            let priceVal = document.getElementById(`p-price-${index}`).value;
            let stockVal = document.getElementById(`p-stock-${index}`).value;
            productsDB[index].price = Number(priceVal); productsDB[index].stock = Number(stockVal);
            let prod = productsDB[index];
            let payload = { action: "updateProduct", barcode: prod.barcode, name: prod.name, price: prod.price, stock: prod.stock };
            document.getElementById('form-json-data').value = JSON.stringify(payload);
            document.getElementById('hidden-form').submit();
            alert("ပြင်ဆင်ချက်ကို Google Sheet သို့ ပို့လိုက်ပါပြီ။");
            setTimeout(() => { loadProductsFromSheet(); }, 2000);
        }

        function deleteProductFromSheet(index) {
            let prod = productsDB[index];
            if (confirm(`⚠️ "${prod.name}" ကို စာရင်းထဲမှ အပြီးတိုင် ဖျက်ပစ်ရန် သေချာပါသလားဗျာ။`)) {
                let payload = { action: "deleteProduct", barcode: prod.barcode };
                document.getElementById('form-json-data').value = JSON.stringify(payload);
                document.getElementById('hidden-form').submit();
                productsDB.splice(index, 1); renderAdminProducts(productsDB); 
                alert("ပစ္စည်းကို အပြီးတိုင် ဖျက်ဆီးပြီးပါပြီဗျာ။");
                setTimeout(() => { loadProductsFromSheet(); }, 2000);
            }
        }
    </script>
</body>
</html>
