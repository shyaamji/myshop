<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ဆိုင်သုံး POS - Barcode</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Barcode Scanner Library (html5-qrcode) -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; 
            background: #f0f2f5; 
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 15px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { 
            text-align: center; 
            font-size: 24px; 
            color: #1a1a2e; 
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 span { background: #e94560; color: white; padding: 2px 12px; border-radius: 20px; font-size: 14px; }
        
        /* Barcode Search Area */
        .barcode-area {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            align-items: center;
        }
        .barcode-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        .barcode-area input:focus {
            border-color: #16213e;
        }
        .barcode-area button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            background: #16213e;
            color: white;
            touch-action: manipulation;
        }
        .barcode-area button:active { transform: scale(0.95); }
        .barcode-area button.scanner-btn { background: #e94560; }
        
        /* Scanner Modal */
        .scanner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .scanner-modal.active {
            display: flex;
        }
        .scanner-modal #reader {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
        }
        .scanner-modal .close-scanner {
            margin-top: 20px;
            padding: 14px 40px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .scanner-modal .close-scanner:active { transform: scale(0.95); }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin: 15px 0; 
        }
        .product-item { 
            background: #16213e; 
            color: white; 
            padding: 18px 5px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            border: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.1s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            touch-action: manipulation;
        }
        .product-item:active { 
            transform: scale(0.94); 
            background: #0f3460; 
        }
        .product-item .price { 
            font-size: 13px; 
            font-weight: normal; 
            opacity: 0.9;
            display: block;
            margin-top: 4px;
        }
        .product-item .stock-badge {
            background: rgba(255,255,255,0.2);
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 12px;
            display: inline-block;
            margin-top: 5px;
        }
        .product-item.out-of-stock {
            opacity: 0.4;
            pointer-events: none;
        }
        
        .cart-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            min-height: 80px;
        }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 0; 
            border-bottom: 1px solid #e9ecef; 
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item .name { font-weight: 500; }
        .cart-item .qty-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-item .qty-control button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #e94560;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }
        .cart-item .qty-control button:active { background: #c73652; }
        .cart-item .qty-control .qty { font-weight: 600; min-width: 20px; text-align: center; }
        
        .total { 
            font-size: 22px; 
            font-weight: 700; 
            text-align: right; 
            padding: 12px 0; 
            color: #16213e;
        }
        
        .checkout-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.1s ease;
            touch-action: manipulation;
            box-shadow: 0 4px 12px rgba(40,167,69,0.3);
        }
        .checkout-btn:active { 
            transform: scale(0.97); 
            background: #1e7e34; 
        }
        .checkout-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        #status { 
            margin: 12px 0; 
            padding: 12px;
            border-radius: 10px;
            text-align: center; 
            font-weight: 600;
            display: none;
        }
        #status.success { background: #d4edda; color: #155724; display: block; }
        #status.error { background: #f8d7da; color: #721c24; display: block; }
        #status.loading { background: #cce5ff; color: #004085; display: block; }
        
        .empty-cart { text-align: center; color: #6c757d; padding: 20px 0; font-size: 15px; }
        
        .install-banner {
            background: #16213e;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .install-banner button {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .install-banner button:active { background: #c73652; }
        
        /* Barcode found highlight */
        .barcode-found {
            border-color: #28a745 !important;
            background: #d4edda !important;
        }
        
        @media (max-width: 400px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧾 POS <span>v2.0</span></h1>
    
    <div class="install-banner" id="installBanner">
        <span>📲 App အနေနဲ့ ထည့်သုံးပါ</span>
        <button id="installBtn">Install</button>
    </div>
    
    <!-- Barcode Search -->
    <div class="barcode-area">
        <input type="text" id="barcodeInput" placeholder="📷 Barcode ရိုက်ထည့်ပါ" autocomplete="off">
        <button class="scanner-btn" id="scanBtn">📷</button>
        <button id="searchBtn">🔍</button>
    </div>
    
    <div id="productArea" class="product-grid">🔄 ကုန်ပစ္စည်းများ ရယူနေသည်...</div>
    
    <div class="cart-section">
        <h3 style="margin-bottom: 10px; font-size: 16px;">🛒 ဝယ်ယူမှုစာရင်း</h3>
        <div id="cartItems"><div class="empty-cart">ကုန်ပစ္စည်းမရွေးရသေးပါ</div></div>
        <div id="totalAmount" class="total">Total: 0 MMK</div>
    </div>
    
    <button class="checkout-btn" id="checkoutBtn" disabled>✅ ငွေရှင်းမည်</button>
    <div id="status"></div>
</div>

<!-- Scanner Modal -->
<div class="scanner-modal" id="scannerModal">
    <div id="reader"></div>
    <button class="close-scanner" id="closeScanner">✕ ပိတ်မည်</button>
</div>

<script>
    // 🔥 အရေးကြီး: မင်းရဲ့ Google Apps Script Web App URL ကို ဒီမှာထည့်ပါ
    const API_URL = 'https://script.google.com/macros/s/AKfycbwMMuIL-rjYFd4OoCicZ5NALkQRilXpkK834WDZuAPiWoJgDvFQok-eAhnqFzSVg73t/exec'; 
    
    let products = [];
    let cart = [];
    let isProcessing = false;
    let html5QrCode = null;

    // ---------- PWA Install Logic ----------
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                installBanner.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    window.addEventListener('appinstalled', () => {
        installBanner.style.display = 'none';
    });

    // ---------- Barcode Scanner ----------
    function startScanner() {
        const modal = document.getElementById('scannerModal');
        modal.classList.add('active');
        
        if (html5QrCode) {
            html5QrCode.clear();
            html5QrCode = null;
        }
        
        html5QrCode = new Html5Qrcode("reader");
        
        const config = {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };
        
        html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanError
        ).catch(err => {
            console.error("Scanner error:", err);
            showStatus('📷 ကင်မရာဖွင့်မရပါ။ ခွင့်ပြုချက်စစ်ပါ။', 'error');
            closeScanner();
        });
    }

    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('barcodeInput').value = decodedText;
        document.getElementById('barcodeInput').classList.add('barcode-found');
        setTimeout(() => {
            document.getElementById('barcodeInput').classList.remove('barcode-found');
        }, 1000);
        searchByBarcode(decodedText);
        closeScanner();
    }

    function onScanError(err) {
        // ဆိုင်းငံ့ထားပါ (စကင်န်လုပ်နေဆဲ)
    }

    function closeScanner() {
        const modal = document.getElementById('scannerModal');
        modal.classList.remove('active');
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                html5QrCode.clear();
                html5QrCode = null;
            }).catch(err => console.error('Stop scanner error:', err));
        }
    }

    document.getElementById('scanBtn').addEventListener('click', startScanner);
    document.getElementById('closeScanner').addEventListener('click', closeScanner);

    // ---------- Barcode Search ----------
    function searchByBarcode(barcode) {
        if (!barcode || barcode.trim() === '') {
            showStatus('⚠️ Barcode ထည့်ပါ။', 'error');
            return;
        }
        
        const product = products.find(p => p[4] && p[4].toString() === barcode.trim());
        if (product) {
            addToCart(product);
            document.getElementById('barcodeInput').value = '';
            showStatus(`✅ ${product[1]} ကို ဈေးခြင်းထဲထည့်ပြီးပါပြီ။`, 'success');
        } else {
            showStatus('❌ ဒီ Barcode နဲ့ ကုန်ပစ္စည်းမရှိပါ။', 'error');
        }
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
        const barcode = document.getElementById('barcodeInput').value;
        searchByBarcode(barcode);
    });

    document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const barcode = document.getElementById('barcodeInput').value;
            searchByBarcode(barcode);
        }
    });

    // ---------- Main POS Logic ----------
    function showStatus(msg, type = 'loading') {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type;
        el.style.display = 'block';
        if (type !== 'loading') {
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }
    }

    function updateCheckoutBtn() {
        const btn = document.getElementById('checkoutBtn');
        btn.disabled = cart.length === 0 || isProcessing;
    }

    // Load Products
    fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            products = data.slice(1);
            displayProducts();
        })
        .catch(err => {
            document.getElementById('productArea').innerHTML = '❌ ကုန်ပစ္စည်းများ ရယူမရပါ';
            console.error(err);
        });

    function displayProducts() {
        const area = document.getElementById('productArea');
        area.innerHTML = '';
        products.forEach(item => {
            const id = item[0], name = item[1], price = item[2], stock = item[3];
            const btn = document.createElement('button');
            btn.className = `product-item ${stock <= 0 ? 'out-of-stock' : ''}`;
            btn.innerHTML = `
                ${name}
                <span class="price">${price.toLocaleString()} MMK</span>
                <span class="stock-badge">${stock} လက်</span>
            `;
            if (stock > 0) {
                btn.onclick = () => addToCart(item);
            }
            area.appendChild(btn);
        });
    }

    function addToCart(item) {
        const existing = cart.find(c => c[0] === item[0]);
        if (existing) {
            if (existing[3] < item[3]) {
                existing[3] += 1;
            } else {
                showStatus('လက်ကျန်မလုံလောက်ပါ', 'error');
                return;
            }
        } else {
            cart.push([item[0], item[1], item[2], 1]);
        }
        renderCart();
    }

    function renderCart() {
        const cartDiv = document.getElementById('cartItems');
        let total = 0;
        
        if (cart.length === 0) {
            cartDiv.innerHTML = '<div class="empty-cart">ကုန်ပစ္စည်းမရွေးရသေးပါ</div>';
            document.getElementById('totalAmount').innerText = 'Total: 0 MMK';
            updateCheckoutBtn();
            return;
        }

        cartDiv.innerHTML = '';
        cart.forEach((item, index) => {
            const itemTotal = item[2] * item[3];
            total += itemTotal;
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <span class="name">${item[1]}</span>
                <div class="qty-control">
                    <button onclick="changeQty(${index}, -1)">−</button>
                    <span class="qty">${item[3]}</span>
                    <button onclick="changeQty(${index}, 1)">+</button>
                    <span style="min-width:50px;text-align:right;font-weight:600;">${itemTotal.toLocaleString()}</span>
                </div>
            `;
            cartDiv.appendChild(div);
        });
        
        document.getElementById('totalAmount').innerText = `Total: ${total.toLocaleString()} MMK`;
        updateCheckoutBtn();
    }

    function changeQty(index, delta) {
        const item = cart[index];
        const product = products.find(p => p[0] === item[0]);
        const newQty = item[3] + delta;
        
        if (newQty < 1) {
            cart.splice(index, 1);
        } else if (newQty > product[3]) {
            showStatus('လက်ကျန်မလုံလောက်ပါ', 'error');
            return;
        } else {
            item[3] = newQty;
        }
        renderCart();
    }

    // Checkout
    document.getElementById('checkoutBtn').addEventListener('click', function() {
        if (cart.length === 0 || isProcessing) return;
        isProcessing = true;
        updateCheckoutBtn();
        showStatus('⏳ လုပ်ဆောင်နေသည်...', 'loading');

        const payload = cart.map(item => ({
            id: item[0],
            name: item[1],
            price: item[2],
            quantity: item[3]
        }));

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: payload })
        })
        .then(() => {
            showStatus('✅ ငွေရှင်းခြင်းအောင်မြင်ပါသည်!', 'success');
            cart = [];
            renderCart();
            return fetch(API_URL);
        })
        .then(res => res.json())
        .then(data => {
            products = data.slice(1);
            displayProducts();
            isProcessing = false;
            updateCheckoutBtn();
        })
        .catch(err => {
            showStatus('❌ အမှားရှိပါသည်။ နောက်တစ်ကြိမ်ကြိုးစားပါ။', 'error');
            console.error(err);
            isProcessing = false;
            updateCheckoutBtn();
        });
    });

</script>
</body>
</html>
