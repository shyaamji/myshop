<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ဝင်းသီရိ</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root,[data-theme=light]{--bg-main:#f1f5f9;--bg-card:#fff;--bg-input:#f8fafc;--text-main:#0f172a;--text-muted:#64748b;--accent-gold:#b45309;--accent-success:#10b981;--accent-danger:#ef4444;--border-color:rgba(15,23,42,0.08)}
        [data-theme=dark]{--bg-main:#0b0f19;--bg-card:#151c2c;--bg-input:#1e2640;--text-main:#f8fafc;--text-muted:#94a3b8;--accent-gold:#fbbf24;--accent-success:#10b981;--accent-danger:#f43f5e;--border-color:rgba(255,255,255,0.05)}
        *{box-sizing:border-box}body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-main);color:var(--text-main);overscroll-behavior:none;height:100%}
        #app-lock-screen{position:fixed;inset:0;background:var(--bg-main);z-index:99999;display:flex;align-items:center;justify-content:center}
        .lock-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:24px;padding:2.5rem 2rem;width:90%;max-width:380px;box-shadow:0 20px 40px -10px rgba(0,0,0,0.1)}
        #app-main-content{display:none}
        .tab-content{display:none}.tab-content.active{display:block}
        .premium-nav{background:var(--bg-card)!important;border-bottom:1px solid var(--border-color)}
        .nav-tabs-custom{background:var(--bg-card);border-radius:16px;padding:6px;border:1px solid var(--border-color);display:flex;gap:4px;flex-wrap:wrap}
        .nav-tabs-custom .btn{border:none;border-radius:12px;font-weight:600;font-size:13px;color:var(--text-muted);padding:10px 4px;flex:1;transition:all .3s;background:transparent}
        .nav-tabs-custom .btn.active{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
        [data-theme=dark] .nav-tabs-custom .btn.active{background:linear-gradient(135deg,#fbbf24,#d97706);color:#000}
        .custom-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:1.5rem;margin-bottom:1.5rem}
        .form-control{background:var(--bg-input)!important;border:1px solid var(--border-color)!important;color:var(--text-main)!important;border-radius:12px;padding:12px 16px;width:100%}
        .btn-premium-gold{background:linear-gradient(135deg,#d97706,#b45309);color:#fff!important;font-weight:700;border:none;border-radius:14px;padding:12px 24px;cursor:pointer}
        [data-theme=dark] .btn-premium-gold{background:linear-gradient(135deg,#fbbf24,#d97706);color:#000!important}
        .toast-big{position:fixed;top:0;left:0;right:0;z-index:999999;background:var(--bg-card);border-bottom:4px solid var(--accent-gold);padding:12px 20px;font-size:15px;font-weight:700;display:none;text-align:center}
        .toast-big.show{display:block}.toast-big.success{border-bottom-color:var(--accent-success)}.toast-big.danger{border-bottom-color:var(--accent-danger)}
        .stock-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:700}
        .stock-badge.in-stock{background:#dcfce7;color:#16a34a}.stock-badge.low-stock{background:#fef3c7;color:#d97706}.stock-badge.out-of-stock{background:#fee2e2;color:#dc2626}
        .search-results{position:absolute;left:0;right:0;z-index:9999;max-height:260px;overflow-y:auto;background:var(--bg-card);border:2px solid var(--accent-gold);border-radius:14px;display:none}
        .scanner-popup-toggle{position:fixed;bottom:100px;right:20px;z-index:9998;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#d97706,#b45309);color:#fff;border:none;font-size:24px;cursor:pointer}
        .admin-only-feature{display:none}
    </style>
</head>
<body>
<div id="app-lock-screen"><div class="lock-card text-center"><h4 class="fw-bold mb-1">ဝင်းသီရိ</h4><p class="small mb-4 fw-bold" style="color:var(--accent-gold);">PREMIUM POS</p><input type="password" id="home-pass-input" class="form-control text-center mb-4" placeholder="••••" style="font-size:24px;letter-spacing:6px;"><button class="btn-premium-gold w-100" onclick="checkUniversalLogin()">🔓 ဝင်မည်</button><div id="lock-error" class="text-danger small mt-3 fw-bold" style="display:none;">❌ Password မှားနေပါသည်</div></div></div>

<div id="toastBig" class="toast-big"><div id="toastBigMsg"></div></div>

<button class="scanner-popup-toggle" onclick="toggleFullScanner()">📷</button>

<div id="app-main-content">
    <nav class="navbar premium-nav sticky-top px-3 py-3"><span class="fw-bold fs-5"><span style="color:var(--accent-gold);">✨</span> ဝင်းသီရိ</span></nav>
    <div class="container mt-3">
        <div class="nav-tabs-custom">
            <button class="btn active" onclick="switchTab('sales')">🛒 အရောင်း</button>
            <button class="btn" onclick="switchTab('history')">📜 မှတ်တမ်း</button>
            <button class="btn admin-only-feature" onclick="switchTab('dashboard')">📊 ဒိုင်ခွက်</button>
            <button class="btn admin-only-feature" onclick="switchTab('admin')">⚙️ စီမံ</button>
            <button class="btn text-danger" onclick="lockAppImmediate()">🔒 ထွက်မည်</button>
            <button class="btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        </div>
    </div>
    <div class="container mt-3 pb-5">
        <div id="sales" class="tab-content active">
            <div class="mb-3"><button class="btn btn-sm btn-outline-secondary" onclick="reloadOnlineSalesTab(this)">🔄 Sync</button></div>
            <div class="custom-card"><h6 class="fw-bold mb-2">🔍 ပစ္စည်းရှာရန်</h6><input type="search" id="name-search-input" class="form-control" placeholder="ပစ္စည်းအမည်..." oninput="filterProductNames()"></div>
            <div id="search-suggestions" class="search-results"></div>
            <div class="custom-card"><h6 class="fw-bold mb-2">🛒 ဝယ်ယူမည့်စာရင်း</h6><div id="cart-list" style="max-height:250px;overflow-y:auto;"></div>
                <div class="row g-2 mt-2"><div class="col-6"><label class="small">Discount</label><input type="text" id="cart-discount-input" class="form-control form-control-sm" placeholder="500 or 5%" oninput="renderCart()"></div><div class="col-6"><label class="small">ငွေချေမှု</label><select id="cart-payment-mode" class="form-control form-control-sm"><option>Cash</option><option>KPay</option><option>Wave</option></select></div></div>
                <div class="d-flex justify-content-between align-items-center mt-3"><h4>Total: <span id="cart-total" style="color:var(--accent-gold);">0</span> Ks</h4><button class="btn-premium-gold" onclick="checkout()">Voucher ထုတ်မည်</button></div>
            </div>
        </div>
        <div id="history" class="tab-content">
            <div class="mb-3"><button class="btn btn-sm btn-outline-secondary" onclick="reloadOnlineHistoryTab(this)">🔄 Sync</button></div>
            <input type="search" id="search-input" class="form-control mb-3" placeholder="🔍 Voucher ID / ဝယ်သူအမည်..." onkeyup="searchHistory()">
            <div id="history-list"></div>
        </div>
        <div id="dashboard" class="tab-content"><div class="custom-card"><h6>📊 ဒိုင်ခွက် (မကြာမီ)</h6></div></div>
        <div id="admin" class="tab-content">
            <div class="mb-3"><button class="btn btn-sm btn-outline-secondary" onclick="reloadOnlineAdminTab(this)">🔄 Sync</button></div>
            <div class="custom-card"><h6 class="fw-bold text-success mb-3">➕ ပစ္စည်းအသစ်</h6>
                <input type="text" id="new-barcode" class="form-control mb-2" placeholder="Barcode">
                <input type="text" id="new-name" class="form-control mb-2" placeholder="ပစ္စည်းအမည်" required>
                <div class="row g-2"><div class="col-6"><input type="number" id="new-cost" class="form-control" placeholder="အရင်းဈေး" value="0"></div><div class="col-6"><input type="number" id="new-price" class="form-control" placeholder="ရောင်းဈေး"></div></div>
                <div class="row g-2 mt-2"><div class="col-6"><input type="number" id="new-stock" class="form-control" placeholder="စတော့"></div><div class="col-6"><input type="number" id="new-min-stock" class="form-control" placeholder="Min Stock" value="5"></div></div>
                <button class="btn btn-success w-100 mt-3" id="add-prod-btn" onclick="addNewProduct()">💾 သိမ်းမည်</button>
            </div>
            <div class="custom-card"><h6 class="fw-bold mb-3">📝 ပစ္စည်းများ ပြင်ရန်</h6><input type="search" id="admin-search-input" class="form-control mb-3" placeholder="ပစ္စည်းရှာ..." onkeyup="filterAdminProductNames()"><div id="admin-product-list"></div></div>
        </div>
    </div>
</div>

<script>
// SUPABASE CONFIG
var SUPABASE_URL = 'https://mqkvfcjhwhurdakozote.supabase.co';
var SUPABASE_KEY = 'sb_publishable_pSE6Dtsb-QQfZdODBqTxEw_ydLGlZUN';
var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var homePassword = 'w', adminPassword = 'wtr';
var productsDB = [], salesHistory = [], activeCartIndex = 0;
var carts = [[], [], [], []];

function getStockNumber(p) { if (!p) return 0; var v = p.stock; if (v === undefined || v === null || v === '') return 0; var n = Number(v); return isNaN(n) ? 0 : n; }
function showBigToast(m, t) { t = t || 'success'; var el = document.getElementById('toastBig'); document.getElementById('toastBigMsg').textContent = m; el.className = 'toast-big show ' + t; setTimeout(function() { el.classList.remove('show'); }, 2500); }

// LOGIN
function checkUniversalLogin() { var i = document.getElementById('home-pass-input').value.trim(); if (i === adminPassword || i === homePassword) { sessionStorage.setItem('isAppUnlocked', 'true'); localStorage.setItem('currentUserRole', i === adminPassword ? 'admin' : 'user'); document.getElementById('app-lock-screen').style.display = 'none'; document.getElementById('app-main-content').style.display = 'block'; setupRolePrivilegesUi(); } else { document.getElementById('lock-error').style.display = 'block'; } }
function setupRolePrivilegesUi() { var r = localStorage.getItem('currentUserRole') || 'user'; if (r === 'admin') { document.querySelectorAll('.admin-only-feature').forEach(function(el) { el.style.display = 'block'; }); } else { document.querySelectorAll('.admin-only-feature').forEach(function(el) { el.style.display = 'none'; }); switchTab('sales'); } }
function lockAppImmediate() { sessionStorage.removeItem('isAppUnlocked'); localStorage.removeItem('currentUserRole'); window.location.reload(); }
function switchTab(id) { document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); }); document.querySelectorAll('.nav-tabs-custom .btn').forEach(function(el) { el.classList.remove('active'); }); document.getElementById(id).classList.add('active'); if (id === 'admin') renderAdminProducts(productsDB); }
function toggleTheme() { var c = document.documentElement.getAttribute('data-theme') || 'light', n = c === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', n); localStorage.setItem('theme', n); document.getElementById('theme-btn').innerHTML = n === 'dark' ? '☀️' : '🌙'; }

// ========== SUPABASE DATA ==========
function loadProducts() { supabase.from('Products').select('*').then(function(r) { if (r.data && r.data.length > 0) productsDB = r.data; }); }
function loadSalesHistory() { supabase.from('SalesHistory').select('*').order('id', { ascending: false }).then(function(r) { if (r.data && r.data.length > 0) { salesHistory = r.data; localStorage.setItem('salesHistory', JSON.stringify(salesHistory)); displayHistory(salesHistory); } else { var local = localStorage.getItem('salesHistory'); if (local) { salesHistory = JSON.parse(local); displayHistory(salesHistory); } } }).catch(function() { var local = localStorage.getItem('salesHistory'); if (local) { salesHistory = JSON.parse(local); displayHistory(salesHistory); } }); }

function reloadOnlineSalesTab(b) { b.disabled = true; b.innerText = "⏳"; supabase.from('Products').select('*').then(function(r) { if (r.data) productsDB = r.data; b.disabled = false; b.innerText = "🔄 Sync"; showBigToast('✅ Update ပြီး'); }); }
function reloadOnlineAdminTab(b) { b.disabled = true; b.innerText = "⏳"; supabase.from('Products').select('*').then(function(r) { if (r.data) productsDB = r.data; b.disabled = false; b.innerText = "🔄 Sync"; renderAdminProducts(productsDB); showBigToast('✅ Update ပြီး'); }); }
function reloadOnlineHistoryTab(b) { b.disabled = true; b.innerText = "⏳"; supabase.from('SalesHistory').select('*').order('id', { ascending: false }).then(function(r) { if (r.data && r.data.length > 0) { salesHistory = r.data; localStorage.setItem('salesHistory', JSON.stringify(salesHistory)); displayHistory(salesHistory); } b.disabled = false; b.innerText = "🔄 Sync"; showBigToast('✅ Update ပြီး'); }); }

// CHECKOUT
function checkout() {
    var cart = carts[activeCartIndex];
    if (!cart.length) { showBigToast('ပစ္စည်းမရှိပါ', 'danger'); return; }
    var cn = prompt("ဝယ်သူအမည် -", "customer") || "customer";
    var vid = "WM-" + Date.now().toString().slice(-6);
    var total = document.getElementById('cart-total').innerText;
    var disc = document.getElementById('cart-discount-input').value.trim() || "0";
    var pm = document.getElementById('cart-payment-mode').value;
    
    var saleData = { voucher_id: vid, date: new Date().toLocaleString(), customer_name: cn, items: JSON.stringify(cart), total_amount: total.replace(/,/g, ''), extra1: disc, extra2: pm };
    
    supabase.from('SalesHistory').insert([saleData]).then(function() {
        salesHistory.unshift({ voucher_id: vid, date: new Date().toLocaleString(), customer_name: cn, items: cart, total_amount: total, extra1: disc, extra2: pm });
        localStorage.setItem('salesHistory', JSON.stringify(salesHistory));
        displayHistory(salesHistory);
        showBigToast('✅ ' + vid + ' ထုတ်ပြီး');
        
        // UPDATE STOCK
        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            var newStock = Math.max(0, getStockNumber(item) - item.qty);
            supabase.from('Products').update({ stock: String(newStock) }).eq('barcode', item.barcode.toString()).then(function() {});
            for (var j = 0; j < productsDB.length; j++) {
                if (productsDB[j].barcode.toString() === item.barcode.toString()) { productsDB[j].stock = String(newStock); break; }
            }
        }
    }).catch(function() {
        salesHistory.unshift({ voucher_id: vid, date: new Date().toLocaleString(), customer_name: cn, items: cart, total_amount: total, extra1: disc, extra2: pm });
        localStorage.setItem('salesHistory', JSON.stringify(salesHistory));
        displayHistory(salesHistory);
        showBigToast('⚠️ Offline သိမ်းပြီး', 'danger');
    });
    
    carts[activeCartIndex] = []; document.getElementById('cart-discount-input').value = '';
    renderCart(); document.getElementById('name-search-input').value = ''; document.getElementById('search-suggestions').style.display = 'none';
}

// ADMIN
function addNewProduct() {
    var name = document.getElementById('new-name').value.trim(), price = document.getElementById('new-price').value.trim();
    if (!name || !price) { showBigToast('ဖြည့်ပါ', 'danger'); return; }
    var btn = document.getElementById('add-prod-btn'); btn.disabled = true;
    var np = { barcode: document.getElementById('new-barcode').value || "NB-" + Date.now(), name: name, price: price, stock: document.getElementById('new-stock').value || '0', extra1: document.getElementById('new-cost').value || '0', extra2: document.getElementById('new-min-stock').value || '5' };
    supabase.from('Products').insert([np]).then(function() {
        btn.disabled = false; showBigToast('✅ သိမ်းပြီး');
        ['new-barcode','new-name','new-price','new-stock','new-cost','new-min-stock'].forEach(function(id) { document.getElementById(id).value = ''; });
        document.getElementById('new-cost').value = '0'; document.getElementById('new-min-stock').value = '5';
        loadProducts(); switchTab('sales');
    }).catch(function(err) { btn.disabled = false; showBigToast('❌ ' + err.message, 'danger'); });
}
function uploadProductToSheet(idx) {
    var cost = document.getElementById('p-cost-' + idx).value, price = document.getElementById('p-price-' + idx).value, stock = document.getElementById('p-stock-' + idx).value, prod = productsDB[idx];
    var btn = document.getElementById('edit-btn-' + idx); btn.disabled = true; btn.innerText = "⏳";
    supabase.from('Products').update({ price: price, stock: stock, extra1: cost }).eq('barcode', prod.barcode).then(function() {
        btn.disabled = false; btn.innerText = "💾 ပြင်"; showBigToast('✅ ပြင်ပြီး'); loadProducts();
    }).catch(function(err) { btn.disabled = false; btn.innerText = "💾 ပြင်"; showBigToast('❌ ' + err.message, 'danger'); });
}
function deleteProductFromSheet(idx) {
    var prod = productsDB[idx];
    if (!confirm(prod.name + ' ဖျက်မလား?')) return;
    supabase.from('Products').delete().eq('barcode', prod.barcode).then(function() {
        productsDB.splice(idx, 1); renderAdminProducts(productsDB); showBigToast('🗑️ ဖျက်ပြီး'); loadProducts();
    });
}
function deleteSaleFromSheet(vid) {
    if (!confirm("ဖျက်မှာသေချာလား?")) return;
    supabase.from('SalesHistory').delete().eq('voucher_id', vid.toString()).then(function() {
        salesHistory = salesHistory.filter(function(s) { return (s.voucher_id || '').toString() !== vid.toString(); });
        localStorage.setItem('salesHistory', JSON.stringify(salesHistory)); displayHistory(salesHistory); showBigToast('🗑️ ဖျက်ပြီး');
    });
}

// CART
function renderCart() { var cart = carts[activeCartIndex] || [], list = document.getElementById('cart-list'), total = 0; if (!cart.length) { list.innerHTML = '<div class="text-center text-muted py-3">ပစ္စည်းမရှိပါ</div>'; document.getElementById('cart-total').innerText = '0'; return; } list.innerHTML = ''; cart.forEach(function(item, i) { total += Number(item.price) * item.qty; list.innerHTML += '<div class="d-flex justify-content-between align-items-center border-bottom py-2"><div><b>' + item.name + '</b><br><small style="color:var(--accent-gold);">' + Number(item.price).toLocaleString() + ' Ks</small></div><div class="d-flex align-items-center gap-2"><button class="btn btn-sm btn-outline-secondary" onclick="changeQty(' + i + ',-1)">-</button><span class="fw-bold">' + item.qty + '</span><button class="btn btn-sm btn-outline-secondary" onclick="changeQty(' + i + ',1)">+</button><button class="btn btn-sm text-danger" onclick="removeCartItem(' + i + ')">✕</button></div></div>'; }); var dIn = document.getElementById('cart-discount-input').value.trim(), dAmt = 0; if (dIn.includes('%')) dAmt = total * (parseFloat(dIn.replace('%','')) / 100); else dAmt = Number(dIn) || 0; document.getElementById('cart-total').innerText = Math.max(0, total - dAmt).toLocaleString(); }
function changeQty(i, c) { var cart = carts[activeCartIndex], st = getStockNumber(cart[i]), nq = cart[i].qty + c; if (nq <= 0) cart.splice(i, 1); else if (nq > st) { showBigToast('⚠️ ' + st + ' ခုသာ', 'danger'); return; } else cart[i].qty = nq; renderCart(); }
function removeCartItem(i) { carts[activeCartIndex].splice(i, 1); renderCart(); }

function filterProductNames() { var inp = document.getElementById('name-search-input').value.toLowerCase().trim(), box = document.getElementById('search-suggestions'); if (!inp) { box.style.display = 'none'; return; } var f = productsDB.filter(function(p) { return p.name.toLowerCase().includes(inp); }); box.innerHTML = ''; if (!f.length) { box.innerHTML = '<div class="p-3 text-center text-muted">မတွေ့ပါ</div>'; box.style.display = 'block'; return; } f.forEach(function(prod) { var div = document.createElement('div'); div.className = 'p-3 border-bottom'; div.innerHTML = '<b>' + prod.name + '</b> - <span style="color:var(--accent-gold);">' + Number(prod.price).toLocaleString() + ' Ks</span> <small>(စတော့: ' + getStockNumber(prod) + ')</small>'; div.onclick = function() { addToCart(prod); box.style.display = 'none'; document.getElementById('name-search-input').value = ''; }; box.appendChild(div); }); box.style.display = 'block'; }
function addToCart(prod) { var cart = carts[activeCartIndex], st = getStockNumber(prod); if (st <= 0) { showBigToast('🔴 ကုန်သွားပါပြီ', 'danger'); return; } for (var i = 0; i < cart.length; i++) { if (cart[i].barcode.toString() === prod.barcode.toString()) { if (cart[i].qty >= st) { showBigToast('⚠️ ' + st + ' ခုသာ', 'danger'); return; } cart[i].qty++; renderCart(); showBigToast('✅ +1'); return; } } cart.push({ barcode: prod.barcode, name: prod.name, price: prod.price, stock: prod.stock, qty: 1 }); renderCart(); showBigToast('✅ ထည့်ပြီး'); }

// HISTORY
function displayHistory(data) { var list = document.getElementById('history-list'), role = localStorage.getItem('currentUserRole') || 'user'; if (!data || !data.length) { list.innerHTML = '<div class="text-center text-muted py-4">မှတ်တမ်းမရှိပါ</div>'; return; } list.innerHTML = ''; data.forEach(function(sale) { var items = sale.items; if (typeof items === 'string') { try { items = JSON.parse(items); } catch(e) { items = []; } } var il = ''; if (Array.isArray(items)) { items.forEach(function(item) { il += '<div class="d-flex justify-content-between"><span>' + item.name + '</span><span>x' + item.qty + '</span></div>'; }); } var vid = sale.voucher_id || ''; var cn = sale.customer_name || ''; var dt = sale.date || ''; var total = sale.total_amount || '0'; var pm = sale.extra2 || 'Cash'; var disc = sale.extra1 || '0'; var db = role === 'admin' ? '<button class="btn btn-sm btn-outline-danger mt-2" onclick="deleteSaleFromSheet(\'' + vid + '\')">🗑️ ဖျက်</button>' : ''; list.innerHTML += '<div class="custom-card"><div class="d-flex justify-content-between"><b style="color:var(--accent-gold);">' + vid + '</b><small>' + dt + '</small></div><div>ဝယ်သူ: <b>' + cn + '</b> | ' + pm + '</div><div class="small text-danger">Discount: ' + disc + '</div><hr><div>' + il + '</div><hr><div class="d-flex justify-content-between"><h5 class="text-success">' + Number(total).toLocaleString() + ' Ks</h5>' + db + '</div></div>'; }); }
function searchHistory() { var t = document.getElementById('search-input').value.toLowerCase(); displayHistory(salesHistory.filter(function(s) { return (s.voucher_id || '').toLowerCase().includes(t) || (s.customer_name || '').toLowerCase().includes(t); })); }

// ADMIN RENDER
function filterAdminProductNames() { var inp = document.getElementById('admin-search-input').value.toLowerCase().trim(); if (!inp) { renderAdminProducts(productsDB); return; } renderAdminProducts(productsDB.filter(function(p) { return p.name.toLowerCase().includes(inp); })); }
function renderAdminProducts(arr) { var list = document.getElementById('admin-product-list'); list.innerHTML = ''; arr.forEach(function(prod, idx) { var cost = prod.extra1 || '0', sd = getStockNumber(prod); list.innerHTML += '<div class="border rounded p-3 mb-2"><b>' + prod.name + '</b><br><small>Barcode: ' + prod.barcode + '</small><div class="row g-2 mt-2"><div class="col-4"><input type="number" id="p-cost-' + idx + '" class="form-control form-control-sm" value="' + cost + '" placeholder="အရင်း"></div><div class="col-4"><input type="number" id="p-price-' + idx + '" class="form-control form-control-sm" value="' + prod.price + '" placeholder="ရောင်း"></div><div class="col-4"><input type="number" id="p-stock-' + idx + '" class="form-control form-control-sm" value="' + sd + '" placeholder="စတော့"></div></div><div class="row g-2 mt-2"><div class="col-8"><button class="btn btn-sm btn-premium-gold w-100" id="edit-btn-' + idx + '" onclick="uploadProductToSheet(' + idx + ')">💾 ပြင်</button></div><div class="col-4"><button class="btn btn-sm btn-outline-danger w-100" onclick="deleteProductFromSheet(' + idx + ')">🗑️</button></div></div></div>'; }); }

// SCANNER
var html5QrcodeScannerFull = null;
function toggleFullScanner() { if (html5QrcodeScannerFull) { html5QrcodeScannerFull.stop(); html5QrcodeScannerFull.clear(); html5QrcodeScannerFull = null; } else { html5QrcodeScannerFull = new Html5QrcodeScanner("full-reader", { fps: 10, qrbox: { width: 250, height: 200 } }); html5QrcodeScannerFull.render(function(dt) { var p = productsDB.find(function(x) { return x.barcode.toString() === dt.toString(); }); if (p) { addToCart(p); } else { showBigToast('မတွေ့ပါ: ' + dt, 'danger'); } }); } }

window.onload = function() {
    var theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-btn').innerHTML = theme === 'dark' ? '☀️' : '🌙';
    if (sessionStorage.getItem('isAppUnlocked') === 'true') { setupRolePrivilegesUi(); document.getElementById('app-lock-screen').style.display = 'none'; document.getElementById('app-main-content').style.display = 'block'; }
    loadProducts(); loadSalesHistory(); displayHistory(salesHistory);
    var pw = document.getElementById('home-pass-input'); if (pw) { pw.addEventListener("keypress", function(e) { if (e.key === "Enter") { e.preventDefault(); checkUniversalLogin(); } }); }
};
</script>
