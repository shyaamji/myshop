<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကောင်းမြတ် - POS</title>
    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .qty-btn { width: 40px; height: 40px; font-size: 20px; }
    </style>
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ကောင်းမြတ် (Kaung Myat POS)</span>
        </div>
    </nav>

    <!-- Tab Buttons -->
    <div class="btn-group w-100 sticky-top bg-white shadow-sm" role="group">
        <button class="btn btn-outline-primary active" onclick="switchTab('sales')">အရောင်း</button>
        <button class="btn btn-outline-primary" onclick="switchTab('history')">မှတ်တမ်း</button>
        <button class="btn btn-outline-primary" onclick="switchTab('admin')">Admin</button>
    </div>

    <div class="container mt-3 pb-5">
        <!-- ================= အရောင်း TAB ================= -->
        <div id="sales" class="tab-content active">
            <div class="card p-3 mb-3">
                <h5 class="card-title">Barcode Scanner</h5>
                <div id="reader" style="width: 100%"></div>
            </div>

            <div class="card p-3">
                <h5 class="card-title">ဝယ်ယူနေသော ပစ္စည်းများ</h5>
                <div id="cart-list" class="list-group mb-3"></div>
                <div class="d-flex justify-content-between align-items-center">
                    <h4>စုစုပေါင်း: <span id="cart-total">0</span> Ks</h4>
                    <button class="btn btn-success btn-lg" onclick="checkout()">Voucher ထုတ်မည်</button>
                </div>
            </div>
        </div>

        <!-- ================= မှတ်တမ်း TAB ================= -->
        <div id="history" class="tab-content">
            <input type="text" id="search-input" class="form-control mb-3" placeholder="Voucher ID ဖြင့် ရှာရန်..." onkeyup="searchHistory()">
            <div id="history-list" class="list-group"></div>
        </div>

        <!-- ================= ADMIN TAB ================= -->
        <div id="admin" class="tab-content">
            <div class="card p-3">
                <h5 class="card-title">ပစ္စည်းအချက်အလက် ပြင်ဆင်ရန်</h5>
                <div id="admin-product-list" class="list-group"></div>
            </div>
        </div>
    </div>

    <!-- Audio Effects -->
    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        // Audio & Scanning Configurations
        const beep = document.getElementById('beep-sound');
        let canScan = true;
        let cart = [];
        let productsDB = []; // ဤနေရာတွင် Google Sheet မှ data များဝင်လာမည်

        function playBeep() {
            beep.currentTime = 0;
            beep.play();
        }

        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // --- အဆင့်မြင့် Barcode Scanner စနစ် ---
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render((decodedText, decodedResult) => {
            if (canScan) {
                playBeep();
                addToCart(decodedText);
                
                // ၅ စက္ကန့် စောင့်ပြီးမှ ပြန်ဖတ်မည့် စနစ် (Duplicate Scan မဖြစ်စေရန်)
                canScan = false;
                setTimeout(() => { canScan = true; }, 5000); 
            }
        });

        // --- Cart Operations (+ - စနစ်) ---
        function addToCart(barcode) {
            let item = cart.find(i => i.barcode === barcode);
            if (item) {
                item.qty++;
            } else {
                // နမူနာပစ္စည်း (တကယ်သုံးလျှင် productsDB ထဲမှ ရှာရမည်)
                cart.push({ barcode: barcode, name: "ပစ္စည်း-" + barcode, price: 1500, qty: 1 });
            }
            renderCart();
        }

        function changeQty(index, change) {
            playBeep(); // နှိပ်လိုက်တိုင်း အသံမြည်ရန်
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = '';
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                list.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <h6>${item.name}</h6>
                            <small class="text-muted">${item.price} Ks</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-danger qty-btn" onclick="changeQty(${index}, -1)">-</button>
                            <span class="mx-3 font-weight-bold">${item.qty}</span>
                            <button class="btn btn-sm btn-success qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total;
        }

        // --- Print & Save Voucher ---
        function checkout() {
            if(cart.length === 0) return alert("Cart ထဲမှာ ပစ္စည်းမရှိပါ။");
            playBeep();
            
            // Print Window ဖွင့်ခြင်း
            let printWindow = window.open('', '', 'height=600,width=400');
            printWindow.document.write('<html><head><title>ကောင်းမြတ် POS</title></head><body>');
            printWindow.document.write('<h2>ကောင်းမြတ် (Kaung Myat)</h2>');
            cart.forEach(i => {
                printWindow.document.write(`<p>${i.name} x ${i.qty} = ${i.price * i.qty} Ks</p>`);
            });
            printWindow.document.write(`<hr><h4>စုစုပေါင်း: ${document.getElementById('cart-total').innerText} Ks</h4>`);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
            
            // ဒီနေရာတွင် Google Sheet API သို့ လှမ်းပို့ရန် Code ထည့်ရမည်
            cart = [];
            renderCart();
        }
    </script>
</body>
</html>
