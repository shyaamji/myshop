<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကောင်းမြတ် - POS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Barcode Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .qty-btn { width: 45px; height: 45px; font-size: 22px; font-weight: bold; }
        .product-card { border-left: 5px solid #0d6efd; }
        .search-results { position: absolute; width: 100%; z-index: 1000; max-height: 200px; overflow-y: auto; background: white; border: 1px solid #ced4da; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f1f1; }
        .search-item:hover { background-color: #f8f9fa; }

        /* ================= ပရင်တာထုတ်ရန် သီးသန့် CSS စနစ် (အသစ်) ================= */
        #print-receipt-zone { display: none; } /* ပုံမှန်အချိန်တွင် ဖုံးထားမည် */

        @media print {
            body * { display: none !important; } /* တစ်ပြင်လုံးရှိ အရာအားလုံးကို ဖျောက်မည် */
            #print-receipt-zone, #print-receipt-zone * { display: block !important; } /* ဘောင်ကိုသာ ပြမည် */
            #print-receipt-zone { position: absolute; left: 0; top: 0; width: 100%; padding: 10px; font-family: monospace; }
        }
    </style>

    <script>
        // 👇 အောက်က မျက်တောင်အမွှာကြားထဲမှာ အစ်ကို့ရဲ့ Google Web App URL ကို ထည့်ပေးပါ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzsgaXFfRctzx7dBAsQJPcta_MZJxiNE_3awjLBxlVY-BJucvTne9QQ6tYSdoyqUO21/exec'; 

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>
</head>
<body class="bg-light">

    <!-- 🌟 ဖုန်းထဲတွင် တန်းပြီး Print ထွက်စေရန် ကြားခံတည်ဆောက်ထားသော ဘောင်အကွက် (အသစ်) -->
    <div id="print-receipt-zone"></div>

    <!-- ပုံမှန် App မျက်နှာပြင်တစ်ခုလုံး -->
    <div id="app-main-content">
        <!-- Header ဘား -->
        <nav class="navbar navbar-dark bg-dark sticky-top shadow">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1 fw-bold">ကောင်းမြတ် (Kaung Myat POS)</span>
            </div>
        </nav>

        <!-- Menu ခလုတ်များ -->
        <div class="btn-group w-100 sticky-top bg-white shadow-sm mb-3" role="group">
            <button id="btn-sales" class="btn btn-outline-primary py-2 active" onclick="switchTab('sales')">🛒 အရောင်း</button>
            <button id="btn-history" class="btn btn-outline-primary py-2" onclick="switchTab('history')">📜 မှတ်တမ်း</button>
            <button id="btn-admin" class="btn btn-outline-primary py-2" onclick="switchTab('admin')">⚙️ Admin</button>
        </div>

        <div class="container pb-5">
            
            <!-- ================= ၁။ အရောင်း TAB ================= -->
            <div id="sales" class="tab-content active">
                <div class="card p-2 mb-3 shadow-sm border-0">
                    <h6 class="card-title fw-bold text-secondary">📷 Barcode Scanner</h6>
                    <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden;"></div>
                </div>

                <div class="card p-3 mb-3 shadow-sm border-0 position-relative">
                    <h6 class="card-title fw-bold text-secondary">🔍 ပစ္စည်းအမည်ဖြင့် ရှာရန် (Barcode မပါသောပစ္စည်းများ)</h6>
                    <input type="text" id="name-search-input" class="form-control form-control-lg" placeholder="ပစ္စည်းအမည် ရိုက်ထည့်ပါ..." onkeyup="filterProductNames()">
                    <div id="search-suggestions" class="search-results" style="display: none;"></div>
                </div>

                <div class="card p-3 shadow-sm border-0">
                    <h5 class="card-title fw-bold mb-3">ဝယ်ယူနေသော ပစ္စည်းများ</h5>
                    <div id="cart-list" class="list-group mb-3">
                        <div class="text-center text-muted py-4">ပစ္စည်းများ စကန်ဖတ်ပါ သို့မဟုတ် ရွေးချယ်ပါ</div>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <small class="text-muted">စုစုပေါင်း ကျသင့်ငွေ</small>
                            <h3 class="fw-bold text-primary"><span id="cart-total">0</span> Ks</h3>
                        </div>
                        <button id="checkout-btn" class="btn btn-success btn-lg px-4 shadow" onclick="checkout()">Voucher ထုတ်မည်</button>
                    </div>
                </div>
            </div>

            <!-- ================= ၂။ မှတ်တမ်း TAB ================= -->
            <div id="history" class="tab-content">
                <div class="card p-3 shadow-sm border-0 mb-3">
                    <input type="text" id="search-input" class="form-control form-control-lg" placeholder="🔍 Voucher ID ဖြင့် ရှာရန်..." onkeyup="searchHistory()">
                </div>
                <div id="history-list"></div>
            </div>

            <!-- ================= ၃။ ADMIN TAB ================= -->
            <div id="admin" class="tab-content">
                <div class="card p-3 shadow-sm border-0 mb-4 bg-white" style="border-top: 5px solid #28a745 !important;">
                    <h5 class="card-title fw-bold text-success mb-3">➕ ပစ္စည်းအသစ် ထည့်သွင်းရန်</h5>
                    
                    <form id="hidden-form" method="POST" target="hidden-iframe" class="row g-2">
                        <input type="hidden" name="jsonData" id="form-json-data">
                        <div class="col-12">
                            <input type="text" id="new-barcode" class="form-control" placeholder="Barcode နံပါတ် (မရှိပါက လွတ်ထားနိုင်ပါသည်)">
                        </div>
                        <div class="col-12">
                            <input type="text" id="new-name" class="form-control" placeholder="ပစ္စည်းအမည်" required>
                        </div>
                        <div class="col-6">
                            <input type="number" id="new-price" class="form-control" placeholder="ဈေးနှုန်း (Ks)">
                        </div>
                        <div class="col-6">
                            <input type="number" id="new-stock" class="form-control" placeholder="လက်ကျန်ခုရေ">
                        </div>
                        <div class="col-12 mt-3">
                            <button type="button" class="btn btn-success w-100 fw-bold py-2 shadow-sm" id="add-prod-btn" onclick="addNewProduct()">💾 Google Sheet ထဲသို့ ပစ္စည်းအသစ်သိမ်းမည်</button>
                        </div>
                    </form>
                    <iframe name="hidden-iframe" id="hidden-iframe" style="display:none;"></iframe>
                </div>

                <div class="card p-3 shadow-sm border-0">
                    <h5 class="card-title fw-bold mb-3 text-secondary">📝 ရှိပြီးသား ပစ္စည်းစာရင်း/ဈေးနှုန်း ပြင်ရန်</h5>
                    <button class="btn btn-primary mb-3 w-100" onclick="loadProductsFromSheet()">🔄 Google Sheet မှ ပစ္စည်းစာရင်း ပြန်ဆွဲယူရန်</button>
                    <div id="admin-product-list" class="list-group"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- အသံဖိုင် -->
    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        const beep = document.getElementById('beep-sound');
        let canScan = true;
        let cart = [];
        let productsDB = []; 
        let salesHistory = [];

        window.onload = function() {
            document.getElementById('hidden-form').action = scriptURL;
            loadProductsFromSheet();
        }

        function playBeep() {
            beep.currentTime = 0;
            beep.play().catch(e => console.log("Audio play deferred"));
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.btn-group .btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            
            if(tabId === 'admin') renderAdminProducts();
        }

        function loadProductsFromSheet() {
            if(!scriptURL || scriptURL.includes('ဒီနေရာမှာ')) return;
            
            fetch(scriptURL + '?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                productsDB = data;
                renderAdminProducts();
            }).catch(err => console.log("Error loading products: ", err));
        }

        function filterProductNames() {
            let input = document.getElementById('name-search-input').value.toLowerCase().trim();
            let suggestionsBox = document.getElementById('search-suggestions');
            
            if (input === '') {
                suggestionsBox.style.display = 'none';
                return;
            }

            let filtered = productsDB.filter(p => p.name.toLowerCase().includes(input));
            
            if (filtered.length === 0) {
                suggestionsBox.innerHTML = '<div class="search-item text-muted">ရှာမတွေ့ပါ...</div>';
                suggestionsBox.style.display = 'block';
                return;
            }

            suggestionsBox.innerHTML = '';
            filtered.forEach(prod => {
                let div = document.createElement('div');
                div.className = 'search-item d-flex justify-content-between align-items-center';
                div.innerHTML = `<div><strong>${prod.name}</strong></div> <div class="text-primary fw-bold">${prod.price} Ks</div>`;
                div.onclick = function() {
                    playBeep();
                    addByProductObject(prod);
                    document.getElementById('name-search-input').value = '';
                    suggestionsBox.style.display = 'none';
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (e.target.id !== 'name-search-input') {
                document.getElementById('search-suggestions').style.display = 'none';
            }
        });

        function onScanSuccess(decodedText, decodedResult) {
            if (canScan) {
                playBeep();
                if(document.getElementById('admin').classList.contains('active')) {
                    document.getElementById('new-barcode').value = decodedText;
                    alert("Barcode ဖတ်မိပါပြီ။ အချက်အလက်ဖြည့်ပြီး သိမ်းဆည်းပါ။");
                } else {
                    addToCart(decodedText);
                }
                canScan = false;
                setTimeout(() => { canScan = true; }, 5000); 
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        function addNewProduct() {
            let barcode = document.getElementById('new-barcode').value.trim();
            let name = document.getElementById('new-name').value.trim();
            let price = document.getElementById('new-price').value.trim();
            let stock = document.getElementById('new-stock').value.trim() || 99;

            if(!barcode) {
                barcode = "NO-BARCODE-" + Date.now().toString().slice(-5);
            }

            if(!name || !price) {
                return alert("ကျေးဇူးပြု၍ အချက်အလက်အားလုံး ဖြည့်ပေးပါဗျာ။");
            }

            let btn = document.getElementById('add-prod-btn');
            btn.disabled = true;
            btn.innerText = "⏳ သိမ်းဆည်းနေပါသည်...";

            let payload = {
                action: "updateProduct",
                barcode: barcode,
                name: name,
                price: Number(price),
                stock: Number(stock)
            };

            document.getElementById('form-json-data').value = JSON.stringify(payload);
            document.getElementById('hidden-form').submit();

            setTimeout(() => {
                alert("ပစ္စည်းအသစ်ကို Google Sheet ထဲသို့ လှမ်းပို့လိုက်ပါပြီဗျာ။");
                btn.disabled = false;
                btn.innerText = "💾 Google Sheet ထဲသို့ ပစ္စည်းအသစ်သိမ်းမည်";
                
                document.getElementById('new-barcode').value = '';
                document.getElementById('new-name').value = '';
                document.getElementById('new-price').value = '';
                document.getElementById('new-stock').value = '';
                
                loadProductsFromSheet();
            }, 2000);
        }

        function addToCart(barcode) {
            let product = productsDB.find(p => p.barcode.toString() === barcode.toString());
            if (!product) {
                product = { barcode: barcode, name: "ပစ္စည်းအသစ် (" + barcode + ")", price: 0, stock: 99 };
                productsDB.push(product);
            }
            addByProductObject(product);
        }

        function addByProductObject(product) {
            let item = cart.find(i => i.barcode === product.barcode);
            if (item) {
                item.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function changeQty(index, change) {
            playBeep();
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            if(cart.length === 0) {
                list.innerHTML = '<div class="text-center text-muted py-4">ပစ္စည်းများ စကန်ဖတ်ပါ သို့မဟုတ် ရွေးချယ်ပါ</div>';
                document.getElementById('cart-total').innerText = 0;
                return;
            }
            list.innerHTML = '';
            cart.forEach((item, index) => {
                let itemTotal = item.price * item.qty;
                total += itemTotal;
                list.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center shadow-sm mb-2 rounded border-0 product-card">
                        <div>
                            <h6 class="fw-bold mb-1">${item.name}</h6>
                            <small class="text-primary fw-bold">${item.price} Ks</small>
                            <small class="text-muted ms-2">(${itemTotal} Ks)</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-danger qty-btn shadow-sm" onclick="changeQty(${index}, -1)">-</button>
                            <span class="mx-3 fw-bold fs-5">${item.qty}</span>
                            <button class="btn btn-success qty-btn shadow-sm" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function checkout() {
            if(cart.length === 0) return alert("ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါ။");
            
            playBeep();
            let voucherId = "KM-" + Date.now().toString().slice(-6);
            let total = document.getElementById('cart-total').innerText;
            
            let saleData = {
                action: "addSale",
                voucherId: voucherId,
                items: cart,
                total: total
            };

            document.getElementById('form-json-data').value = JSON.stringify(saleData);
            document.getElementById('hidden-form').submit();

            let localData = { ...saleData, date: new Date().toLocaleString() };
            salesHistory.unshift(localData);
            displayHistory(salesHistory);
            
            // 🌟 အမှားမရှိ တန်းပြီး Print ထုတ်မည့် စနစ်ကို လှမ်းခေါ်ခြင်း
            printVoucher(localData);
            
            cart = [];
            renderCart();
            alert("Voucher ကို Google Sheet ထဲသို့ လှမ်းပို့လိုက်ပါပြီ။");
        }

        // 🌟 အဆင့်မြင့် ကွက်တိ တန်းထွက်မည့် Print စနစ်အသစ် (Window အသစ်ဖွင့်စရာမလိုတော့ပါ)
        function printVoucher(sale) {
            const printZone = document.getElementById('print-receipt-zone');
            
            let itemsHTML = '';
            sale.items.forEach(i => {
                itemsHTML += `<div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:3px;">
                    <span>${i.name} x ${i.qty}</span>
                    <span>${i.price * i.qty} Ks</span>
                </div>`;
            });

            // Voucher ဘောင်ပုံစံ တည်ဆောက်ခြင်း
            printZone.innerHTML = `
                <div style="width:100%; max-width:300px; margin:0 auto; padding:10px; font-family:'Courier New', Courier, monospace; color:#000;">
                    <center>
                        <h3 style="margin: 0 0 5px 0; font-weight:bold;">ကောင်းမြတ် (Kaung Myat)</h3>
                        <p style="margin:0 0 10px 0; font-size:12px;">POS ပြေစာ</p>
                    </center>
                    <div style="font-size:12px; margin-bottom:8px; border-bottom:1px dashed #000; padding-bottom:5px;">
                        Voucher: ${sale.voucherId}<br>
                        နေ့ရက်: ${sale.date || new Date().toLocaleString()}
                    </div>
                    <div style="border-bottom:1px dashed #000; padding-bottom:5px; margin-bottom:8px;">
                        ${itemsHTML}
                    </div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:16px; margin-bottom:15px;">
                        <span>စုစုပေါင်း:</span>
                        <span>${sale.total} Ks</span>
                    </div>
                    <center>
                        <p style="font-size:12px; margin:0;">~ ကျေးဇူးတင်ပါသည် ~</p>
                    </center>
                </div>
            `;

            // စာမျက်နှာအားလုံး အဆင်သင့်ဖြစ်ချိန်တွင် တစ်ခါတည်း Print စနစ် ခေါ်ယူခြင်း
            setTimeout(() => {
                window.print();
            }, 500);
        }

        function displayHistory(data) {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            data.forEach((sale, index) => {
                let itemsList = sale.items.map(i => `<small class="d-block">${i.name} x ${i.qty}</small>`).join('');
                list.innerHTML += `
                    <div class="card p-3 mb-3 shadow-sm border-0">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="fw-bold text-primary">ID: ${sale.voucherId}</h6>
                            <small class="text-muted">${sale.date}</small>
                        </div>
                        <div class="mb-2">${itemsList}</div>
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold text-success mb-0">${sale.total} Ks</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-dark me-2" onclick='printVoucher(${JSON.stringify(sale)})'>🖨️ ပြန်ထုတ်ရန်</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteHistory(${index})">🗑️ ဖျက်ရန်</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function searchHistory() {
            let text = document.getElementById('search-input').value.toLowerCase();
            let filtered = salesHistory.filter(s => s.voucherId.toLowerCase().includes(text));
            displayHistory(filtered);
        }

        function deleteHistory(index) {
            if(confirm("ဤမှတ်တမ်းကို ဖျက်ရန် သေချာပါသလား?")) {
                salesHistory.splice(index, 1);
                displayHistory(salesHistory);
            }
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = '';
            if(!productsDB || productsDB.length === 0) {
                list.innerHTML = '<div class="text-center text-muted py-3">ပစ္စည်းစာရင်း မရှိသေးပါ။ အပေါ်တွင် အသစ်ထည့်နိုင်ပါသည်။</div>';
                return;
            }
            productsDB.forEach((prod, index) => {
                list.innerHTML += `
                    <div class="list-group-item p-3 mb-2 rounded border shadow-sm bg-white">
                        <h6 class="fw-bold">${prod.name}</h6>
                        <small class="text-muted d-block mb-2">Barcode: ${prod.barcode}</small>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="number" class="form-control" value="${prod.price}" onchange="saveAdminChanges(${index}, 'price', this.value)">
                            </div>
                            <div class="col-6">
                                <button class="btn btn-warning w-100 fw-bold" onclick="uploadProductToSheet(${index})">💾 သိမ်းမည်</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function saveAdminChanges(index, field, value) {
            productsDB[index][field] = Number(value);
        }

        function uploadProductToSheet(index) {
            let prod = productsDB[index];
            let payload = {
                action: "updateProduct",
                barcode: prod.barcode,
                name: prod.name,
                price: prod.price,
                stock: prod.stock || 99
            };
            document.getElementById('form-json-data').value = JSON.stringify(payload);
            document.getElementById('hidden-form').submit();
            alert("ပြင်ဆင်မှု သိမ်းဆည်းပြီးပါပြီ။");
            setTimeout(() => { loadProductsFromSheet(); }, 2000);
        }
    </script>
</body>
</html>
